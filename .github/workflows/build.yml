name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ncurses (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libncursesw5-dev

      - name: Build
        run: make

      - name: Verify binary exists
        run: test -f meowdo && echo "build OK"
